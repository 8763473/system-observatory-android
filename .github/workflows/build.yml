name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)"/\1/')
          VERSION_CODE=$(grep versionCode app/build.gradle | head -1 | sed 's/.*versionCode //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 系统观测台 Android v${{ steps.version.outputs.version }}

            自动构建于 ${{ github.sha }}

            ### 安装说明
            1. 下载 app-release.apk
            2. 允许安装未知来源应用
            3. 安装后填入公网地址和设备密钥即可连接
          files: |
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
