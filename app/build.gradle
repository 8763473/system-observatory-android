plugins {
    id 'com.android.application'
}

android {
    namespace 'com.systemobservatory.mobile'
    compileSdk 35

    defaultConfig {
        applicationId 'com.systemobservatory.mobile'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '0.3.0'
    }
}

dependencies {
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'androidx.core:core:1.13.1'
}
